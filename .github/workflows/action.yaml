name: Build & Deploy Doxygen to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz git

      - name: Clone doxygen-awesome-css (v2.4.1)
        run: |
          rm -rf docs/doxygen-awesome-css
          git clone --depth 1 --branch v2.4.1 \
            https://github.com/jothepro/doxygen-awesome-css.git \
            docs/doxygen-awesome-css

      - name: Build Doxygen
        working-directory: docs
        run: doxygen Doxyfile

      - name: Verify output exists
        run: |
          test -d docs/html
          test -f docs/html/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4